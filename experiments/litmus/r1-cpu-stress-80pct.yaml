apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: r1-cpu-stress-80pct
  namespace: social-network
spec:
  engineState: active
  appinfo:
    appns: social-network
    applabel: app=compose-post-service
    appkind: deployment
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-cpu-hog-exec
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "120"
            - name: CPU_CORES
              value: "2"
            - name: CPU_LOAD
              value: "80"
            - name: PODS_AFFECTED_PERC
              value: "100"
