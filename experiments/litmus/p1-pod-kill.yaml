apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: p1-pod-kill
  namespace: social-network
spec:
  engineState: active
  appinfo:
    appns: social-network
    applabel: app=compose-post-service
    appkind: deployment
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "120"
            - name: CHAOS_INTERVAL
              value: "10"
            - name: FORCE
              value: "true"
            - name: PODS_AFFECTED_PERC
              value: "100"
