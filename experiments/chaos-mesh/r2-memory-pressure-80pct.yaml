apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: r2-memory-pressure-80pct
  namespace: social-network
spec:
  mode: all
  selector:
    namespaces:
      - social-network
    labelSelectors:
      app: post-storage-service
  stressors:
    memory:
      workers: 1
      size: "256MB"
  duration: "120s"
