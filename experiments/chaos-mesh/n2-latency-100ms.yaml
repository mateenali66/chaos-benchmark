apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: n2-latency-100ms
  namespace: social-network
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - social-network
    labelSelectors:
      app: post-storage-service
  delay:
    latency: "100ms"
    jitter: "20ms"
    correlation: "50"
  duration: "120s"
