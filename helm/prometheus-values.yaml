################################################################################
# kube-prometheus-stack Helm values
# Tuned for chaos engineering research (7d retention, 20GB storage)
################################################################################

# Disable alertmanager (not needed for benchmarks)
alertmanager:
  enabled: false

# Grafana
grafana:
  adminPassword: "chaos-bench-2026"
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: gp2
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

# Prometheus
prometheus:
  prometheusSpec:
    retention: 7d
    retentionSize: "18GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    # Scrape chaos-mesh metrics
    additionalScrapeConfigs:
      - job_name: chaos-mesh
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - chaos-testing
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
            regex: chaos-mesh
            action: keep

# Node exporter
nodeExporter:
  enabled: true

# kube-state-metrics
kubeStateMetrics:
  enabled: true
